<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOIN ARMIS — CHECKOUT</title>
<script src="https://js.stripe.com/v3/"></script>
<style>
  @font-face{font-family:'Octin';src:url('OctinCollege.otf') format('opentype');font-display:swap}
  @font-face{font-family:'Magazine';src:url('Magazine.ttf') format('truetype');font-display:swap}
  :root{--ink:#0a0a0a;--line:#e6e6e6;--hard:#0a0a0a;--muted:#7a7a7a;--accent:#e2231a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#fff;color:var(--ink);line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}svg{display:block}
  header{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1.5px solid var(--hard)}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 18px;max-width:1400px;margin:0 auto}
  .back{display:flex;align-items:center;gap:8px;font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em}
  .back:hover{color:var(--accent)}
  .brand{justify-self:center}.brand img{height:18px;width:auto}
  main{flex:1;max-width:540px;margin:0 auto;width:100%;padding:32px 18px 80px}
  h1{font-family:"Magazine",sans-serif;font-size:26px;letter-spacing:.04em;margin-bottom:22px}
  .row{display:flex;justify-content:space-between;font-family:"Octin",monospace;font-size:13px;padding:10px 0;border-bottom:1px solid var(--line)}
  .total{display:flex;justify-content:space-between;font-family:"Octin",monospace;font-size:16px;letter-spacing:.1em;margin:16px 0 26px;border-top:1.5px solid var(--hard);padding-top:16px}
  #payment-element{margin-bottom:22px}
  .fl{display:block;font-family:"Octin",monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);margin:10px 0 4px}
  .fi{width:100%;font:inherit;font-size:14px;padding:11px 12px;border:1px solid var(--hard);border-radius:6px;margin-bottom:6px}
  .pay{font-family:"Octin",monospace;letter-spacing:.22em;font-size:14px;border:1px solid var(--hard);padding:16px 0;background:var(--ink);color:#fff;width:100%}
  .pay:hover{background:#fff;color:var(--ink)}.pay:disabled{opacity:.4}
  .msg{font-family:"Octin",monospace;font-size:13px;letter-spacing:.06em;color:var(--muted);text-align:center;padding:30px 0;line-height:1.8}
  .done{text-align:center;padding:50px 0}.done h2{font-family:"Magazine",sans-serif;font-size:28px;margin-bottom:10px}.done p{font-family:"Octin",monospace;font-size:13px;letter-spacing:.08em;color:var(--muted)}
  .btn{font-family:"Octin",monospace;letter-spacing:.2em;font-size:13px;border:1px solid var(--hard);padding:14px 32px;display:inline-block;margin-top:24px}
  .btn:hover{background:var(--ink);color:#fff}
  footer{border-top:1px solid var(--line);font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;padding:26px 18px;text-align:center}
</style>
</head>
<body>
<header><div class="bar">
  <a class="back" href="cart.html"><svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>CART</a>
  <a class="brand" href="index.html"><img src="LOIN_ARMIS_LOGO.svg" alt="LOIN ARMIS"></a><span></span>
</div></header>
<main id="main"></main>
<footer>LOIN ARMIS © 2026 — SECURE CHECKOUT</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="store.js"></script>
<script src="pay-config.js"></script>
<script>
var PROD=[];
var sbc=supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
var sessionUser=null;
var shipCfg={shipping_fee:0,free_over:0};
var COUPONS={LAS2026:0.15,WELCOME15:0.15};
function getCoupon(){try{return (localStorage.getItem('la_coupon')||'').toUpperCase();}catch(e){return '';}}
function couponRate(c){return COUPONS[(c||'').toUpperCase()]||0;}
function findP(id){return PROD.find(function(x){return String(x.id)===String(id);});}
function getCart(){try{return JSON.parse(localStorage.getItem('la_cart_items')||'[]')||[]}catch(e){return[]}}
var main=document.getElementById('main');
var params=new URLSearchParams(location.search);
if(params.get('payment_intent_client_secret') || params.get('done')){ showDone(); }
else { Store.load().then(function(d){ PROD=d; return sbc.auth.getSession(); }).then(function(r){ sessionUser=(r&&r.data&&r.data.session&&r.data.session.user)||null; return Store.settings(); }).then(function(s){ shipCfg=s||shipCfg; startCheckout(); }).catch(function(e){ console.error(e); main.innerHTML='<div class="msg">商品情報を読み込めませんでした。<br>時間をおいて再度お試しください。</div>'; }); }
function showDone(){ localStorage.removeItem('la_cart_items'); localStorage.removeItem('la_coupon'); main.innerHTML='<div class="done"><h2>THANK YOU</h2><p>ご注文ありがとうございます。確認メールをお送りします。</p><a class="btn" href="index.html">CONTINUE SHOPPING</a></div>'; }
function startCheckout(){
  var cart=getCart();
  if(!cart.length){ main.innerHTML='<div class="msg">カートが空です。<br><a class="btn" href="index.html">CONTINUE SHOPPING</a></div>'; return; }
  if(!window.STRIPE_PK){ main.innerHTML='<div class="msg">決済キーが未設定です。<br>pay-config.js に Stripe 公開キー(pk_...) を設定してください。</div>'; return; }
  var rows='', total=0;
  cart.forEach(function(c){var pr=findP(c.id); if(!pr||pr.sold)return; var price=pr.now||0; total+=price;
    rows+='<div class="row"><span>'+pr.n+(c.size?(' / '+c.size):'')+'</span><span>¥'+price.toLocaleString()+'</span></div>';});
  var code=getCoupon(), rate=couponRate(code);
  var discount=rate>0?Math.round(total*rate):0;
  var itemsTotal=total-discount;
  var _fee=parseInt(shipCfg.shipping_fee,10)||0, _fo=parseInt(shipCfg.free_over,10)||0;
  var shipping=(_fee>0 && !(_fo>0 && itemsTotal>=_fo))?_fee:0;
  var grand=itemsTotal+shipping;
  var shipLabel=shipping>0?('¥'+shipping.toLocaleString()):'FREE';
  var discRow=discount>0?('<div class="row" style="color:var(--accent)"><span>COUPON '+code+'</span><span>−¥'+discount.toLocaleString()+'</span></div>'):'';
  main.innerHTML='<h1>CHECKOUT</h1>'+rows+'<div class="row"><span>SUBTOTAL</span><span>¥'+total.toLocaleString()+'</span></div>'+discRow+'<div class="row"><span>SHIPPING</span><span>'+shipLabel+'</span></div><div class="total"><span>TOTAL</span><span>¥'+grand.toLocaleString()+'</span></div><form id="pf"><label class="fl">お名前</label><input class="fi" id="cName" required autocomplete="name"><label class="fl">メールアドレス（領収・コンビニ払い用）</label><input class="fi" id="cEmail" type="email" required autocomplete="email"><div id="payment-element"></div><button class="pay" id="payBtn" type="submit">PAY ¥'+grand.toLocaleString()+'</button><div id="err" class="msg" style="color:var(--accent);padding:12px 0"></div></form>';
  if(sessionUser){ var _em=document.getElementById('cEmail'); if(_em&&!_em.value) _em.value=sessionUser.email||''; }
  var stripe=Stripe(window.STRIPE_PK);
  fetch('/api/create-payment-intent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:cart,userId:sessionUser?sessionUser.id:null,email:sessionUser?sessionUser.email:null,coupon:getCoupon()})})
   .then(function(r){return r.json();})
   .then(function(d){
     if(d.error){document.getElementById('err').textContent=d.error;return;}
     var elements=stripe.elements({clientSecret:d.clientSecret,appearance:{theme:'flat'}});
     var pe=elements.create('payment');pe.mount('#payment-element');
     document.getElementById('pf').addEventListener('submit',function(e){
       e.preventDefault();document.getElementById('payBtn').disabled=true;
       var nm=(document.getElementById('cName')||{}).value||'';
       var em=(document.getElementById('cEmail')||{}).value||'';
       stripe.confirmPayment({elements:elements,confirmParams:{return_url:location.origin+'/checkout.html?done=1',payment_method_data:{billing_details:{name:nm,email:em}}},redirect:'if_required'})
        .then(function(res){
          if(res.error){document.getElementById('err').textContent=res.error.message;document.getElementById('payBtn').disabled=false;}
          else if(res.paymentIntent && (res.paymentIntent.status==='succeeded'||res.paymentIntent.status==='processing')){recordOrder(res.paymentIntent);showDone();}
        });
     });
   })
   .catch(function(){document.getElementById('err').textContent='通信エラー。サーバー関数(/api)が動いているか確認してください。';});
}
function recordOrder(pi){
  if(!sessionUser || !pi || !pi.id) return; // ログイン中のみ。保存はサーバーで検証して行う
  try{
    var nm=(document.getElementById('cName')||{}).value||'';
    var cart=getCart();
    var orderItems=cart.map(function(c){var p=findP(c.id)||{};return {id:c.id,name:p.n||'',size:c.size||'',price:p.now||0};});
    fetch('/api/record-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentIntentId:pi.id,items:orderItems,name:nm})}).catch(function(e){console.error('record',e);});
  }catch(e){console.error('record',e);}
}
</script>
</body>
</html>
