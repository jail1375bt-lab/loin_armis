<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOIN ARMIS — CART</title>
<style>
  @font-face{font-family:'Octin';src:url('OctinCollege.otf') format('opentype');font-display:swap}
  @font-face{font-family:'Magazine';src:url('Magazine.ttf') format('truetype');font-display:swap}
  :root{--ink:#0a0a0a;--line:#e6e6e6;--hard:#0a0a0a;--muted:#7a7a7a;--accent:#e2231a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#fff;color:var(--ink);line-height:1.5;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  img{display:block;width:100%;height:100%;object-fit:cover}
  svg{display:block}
  #sight{position:fixed;top:0;left:0;width:46px;height:46px;margin:-23px 0 0 -23px;pointer-events:none;z-index:9999;mix-blend-mode:multiply;transition:width .12s,height .12s,margin .12s}
  #sight .ring{position:absolute;inset:13px;border:1px solid var(--ink);border-radius:50%}
  #sight .h,#sight .v{position:absolute;background:var(--ink)}
  #sight .h{left:3px;right:3px;top:50%;height:1px;margin-top:-.5px}
  #sight .v{top:3px;bottom:3px;left:50%;width:1px;margin-left:-.5px}
  #sight .dot{position:absolute;top:50%;left:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;background:var(--accent);border-radius:50%;mix-blend-mode:normal;box-shadow:0 0 4px 1px rgba(226,35,26,.95),0 0 9px 3px rgba(226,35,26,.7),0 0 16px 6px rgba(226,35,26,.4);animation:dotGlow 1.1s ease-in-out infinite}
  @keyframes dotGlow{0%,100%{box-shadow:0 0 4px 1px rgba(226,35,26,.9),0 0 8px 3px rgba(226,35,26,.5)}50%{box-shadow:0 0 6px 2px rgba(226,35,26,1),0 0 14px 5px rgba(226,35,26,.85),0 0 24px 9px rgba(226,35,26,.5)}}
  body.armed #sight{width:64px;height:64px;margin:-32px 0 0 -32px}
  body.armed #sight .ring{border-color:var(--accent)}
  body.armed #sight .h,body.armed #sight .v{background:var(--accent)}
  @media (hover:hover) and (pointer:fine){ *{cursor:none !important} }
  header{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1.5px solid var(--hard)}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 18px;max-width:1400px;margin:0 auto}
  .back{display:flex;align-items:center;gap:8px;font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em}
  .back:hover{color:var(--accent)}
  .brand{justify-self:center}.brand img{height:18px;width:auto}
  .right{font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em;justify-self:end;color:var(--muted)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px 80px}
  main.has{justify-content:flex-start;padding-top:34px}
  .empty__logo{width:min(150px,38vw);margin-bottom:26px;animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}
  .empty__t{font-family:"Magazine",sans-serif;font-size:clamp(22px,6vw,30px);letter-spacing:.04em;margin-bottom:12px}
  .empty__s{font-family:"Octin",monospace;font-size:12.5px;letter-spacing:.12em;color:var(--muted);margin-bottom:30px}
  .btn{font-family:"Octin",monospace;letter-spacing:.2em;font-size:13px;border:1px solid var(--hard);padding:15px 36px;background:#fff;display:inline-block}
  .btn:hover{background:var(--ink);color:#fff}
  .cart__h{font-family:"Magazine",sans-serif;font-size:clamp(22px,6vw,30px);letter-spacing:.04em;margin-bottom:20px;text-align:left;width:100%;max-width:620px}
  .cart__list{width:100%;max-width:620px;text-align:left}
  .cart__row{display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding:16px 0}
  .cart__img{width:72px;aspect-ratio:3/4;flex:0 0 auto;border:1.5px solid var(--hard);overflow:hidden;background:#e4e4e1}
  .cart__info{flex:1;min-width:0}
  .cart__name{font-family:"Magazine",sans-serif;font-size:14px;letter-spacing:.02em;line-height:1.25}
  .cart__meta{font-family:"Octin",monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;margin-top:5px}
  .cart__price{font-family:"Octin",monospace;font-size:13px;white-space:nowrap}
  .cart__rm{background:none;border:none;font-family:"Octin",monospace;font-size:14px;color:var(--muted);padding:6px 4px;margin-left:4px}
  .cart__rm:hover{color:var(--accent)}
  .cart__total{display:flex;justify-content:space-between;width:100%;max-width:620px;margin:22px 0 26px;font-family:"Octin",monospace;font-size:15px;letter-spacing:.12em;border-top:1.5px solid var(--hard);padding-top:18px}
  .cart__co{font-family:"Octin",monospace;letter-spacing:.22em;font-size:13px;border:1px solid var(--hard);padding:16px 0;background:var(--ink);color:#fff;width:100%;max-width:620px;margin-bottom:12px}
  .cart__co:hover{background:#fff;color:var(--ink)}
  footer{border-top:1px solid var(--line);background:#fff}
  .foot{max-width:1400px;margin:0 auto;padding:30px 18px;font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:.1em}
</style>
</head>
<body>
<div id="sight" aria-hidden="true"><div class="ring"></div><div class="h"></div><div class="v"></div><div class="dot"></div></div>
<header><div class="bar">
  <a class="back" href="index.html"><svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>BACK</a>
  <a class="brand" href="index.html"><img src="LOIN_ARMIS_LOGO.svg" alt="LOIN ARMIS"></a>
  <span class="right">CART</span>
</div></header>
<main id="cart"></main>
<footer><div class="foot">LOIN ARMIS © 2026 — ALL RIGHTS RESERVED.</div></footer>
<script src="products.js"></script>
<script>
const PROD=window.PRODUCTS||[];
const num=s=>parseInt(String(s).replace(/[^0-9]/g,''),10)||0;
function getCart(){try{return JSON.parse(localStorage.getItem('la_cart_items')||'[]')||[]}catch(e){return[]}}
function saveCart(a){try{localStorage.setItem('la_cart_items',JSON.stringify(a))}catch(e){}}
const m=document.getElementById('cart');
function checkout(){ if(getCart().length) location.href='checkout.html'; }
function draw(){
  const arr=getCart();
  if(!arr.length){
    m.className='';
    m.innerHTML='<img class="empty__logo" src="las-logo.png" alt="LAS">'
      +'<div class="empty__t">YOUR CART IS EMPTY</div>'
      +'<div class="empty__s">NOTHING IN THE BAG YET.</div>'
      +'<a class="btn" href="index.html">CONTINUE SHOPPING</a>';
    return;
  }
  m.className='has';
  let rows='';
  arr.forEach((c,idx)=>{const p=PROD[c.id]||{n:'ITEM',p:'',imgs:null};
    const im=p.imgs?('<img src="'+p.imgs[0]+'" alt="'+p.n+'">'):'';
    rows+='<div class="cart__row"><div class="cart__img">'+im+'</div>'
      +'<div class="cart__info"><div class="cart__name">'+p.n+'</div><div class="cart__meta">SIZE: '+(c.size||'-')+'</div></div>'
      +'<div class="cart__price">'+p.p+'</div><button class="cart__rm" data-i="'+idx+'" aria-label="remove">✕</button></div>';});
  const total=arr.reduce((s,c)=>s+num((PROD[c.id]||{}).p),0);
  m.innerHTML='<div class="cart__h">YOUR CART ('+arr.length+')</div>'
    +'<div class="cart__list">'+rows+'</div>'
    +'<div class="cart__total"><span>TOTAL</span><span>¥'+total.toLocaleString()+'</span></div>'
    +'<button class="cart__co">CHECKOUT</button>'
    +'<a class="btn" href="index.html">CONTINUE SHOPPING</a>';
  m.querySelectorAll('.cart__rm').forEach(b=>b.onclick=()=>{const a=getCart();a.splice(+b.dataset.i,1);saveCart(a);draw();});
  const co=m.querySelector('.cart__co');if(co)co.onclick=checkout;
}
draw();
const sight=document.getElementById('sight');
let tx=innerWidth/2,ty=innerHeight/2,cx=tx,cy=ty;
addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
addEventListener('touchstart',e=>{const t=e.touches[0];if(t){tx=cx=t.clientX;ty=cy=t.clientY}},{passive:true});
addEventListener('touchmove',e=>{const t=e.touches[0];if(t){tx=t.clientX;ty=t.clientY}},{passive:true});
(function loop(){cx+=(tx-cx)*0.35;cy+=(ty-cy)*0.35;sight.style.transform='translate('+cx+'px,'+cy+'px)';requestAnimationFrame(loop);})();
const armSel='a,button';
document.addEventListener('mouseover',e=>{if(e.target.closest(armSel))document.body.classList.add('armed')});
document.addEventListener('mouseout',e=>{if(e.target.closest(armSel))document.body.classList.remove('armed')});
</script>
</body>
</html>
