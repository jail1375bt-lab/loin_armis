<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOIN ARMIS — ADMIN</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f4f4f2;color:#0a0a0a;line-height:1.5}
  header{background:#0a0a0a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
  header b{letter-spacing:.2em;font-size:14px}
  header button{background:none;border:1px solid #fff;color:#fff;padding:6px 12px;font-size:11px;letter-spacing:.1em;cursor:pointer}
  main{max-width:880px;margin:0 auto;padding:24px 16px 80px}
  .login{max-width:360px;margin:80px auto;background:#fff;border:1px solid #ddd;padding:28px;border-radius:8px}
  .login h1{font-size:16px;letter-spacing:.2em;margin-bottom:18px;text-align:center}
  label{display:block;font-size:11px;letter-spacing:.1em;color:#666;margin:12px 0 4px}
  input,textarea,select{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1px solid #bbb;border-radius:6px;background:#fff}
  textarea{min-height:70px;resize:vertical}
  .btn{display:inline-block;background:#0a0a0a;color:#fff;border:none;border-radius:6px;padding:12px 18px;font-size:13px;letter-spacing:.1em;cursor:pointer}
  .btn.alt{background:#fff;color:#0a0a0a;border:1px solid #0a0a0a;padding:6px 10px;font-size:11px}
  .btn.del{background:#fff;color:#e2231a;border:1px solid #e2231a}
  .bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
  .bar h2{font-size:14px;letter-spacing:.16em}
  .card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:16px;margin-bottom:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .imgs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .imgs .th{position:relative;width:60px;height:76px;border:1px solid #ccc;border-radius:4px;overflow:hidden;background:#eee}
  .imgs .th img{width:100%;height:100%;object-fit:cover;display:block}
  .imgs .th button{position:absolute;top:2px;right:2px;background:#000;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1}
  .cardfoot{display:flex;gap:10px;margin-top:14px;align-items:center;flex-wrap:wrap}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px}
  .chk input{width:auto}
  .msg{font-size:12px;color:#0a6b2f;margin-left:auto}
  .err{color:#e2231a;font-size:12px;margin-top:8px}
  .muted{color:#888;font-size:12px}
  .sale-hint{font-size:11px;color:#e2231a;margin-top:4px;min-height:14px}
  /* size chart editor */
  .ctbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
  .ctbl th,.ctbl td{border:1px solid #ddd;padding:0}
  .ctbl input{border:none;border-radius:0;padding:7px 4px;font-size:12px;text-align:center;background:transparent}
  .ctbl th{background:#fafafa;position:relative}
  .ctbl th input{font-weight:700;letter-spacing:.06em}
  .ctbl .cdc,.ctbl .cdr{background:none;border:none;color:#e2231a;cursor:pointer;font-size:12px;padding:4px 6px}
  .chartbtns{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .stockbox{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:6px}
  .stockbox .si label{margin:0 0 2px}
  .stockbox .si input{padding:8px}
  .stockbox .si .z{color:#e2231a}
</style>
</head>
<body>
<header><b>LOIN ARMIS / ADMIN</b><button id="logout" style="display:none">ログアウト</button></header>

<div id="loginView" class="login">
  <h1>ADMIN LOGIN</h1>
  <label>メールアドレス</label><input type="email" id="email" value="">
  <label>パスワード</label><input type="password" id="password">
  <button class="btn" id="loginBtn" style="width:100%;margin-top:18px">ログイン</button>
  <div class="err" id="loginErr"></div>
  <p class="muted" style="margin-top:14px">オーナー専用。商品・在庫・SOLD OUTを管理します。</p>
</div>

<main id="panel" style="display:none">
  <div class="bar"><h2>商品管理</h2><button class="btn" id="addBtn">＋ 新規商品を追加</button></div>
  <div id="list"></div>
</main>

<datalist id="catlist"></datalist>
<datalist id="seasonlist"></datalist>

<script src="supabase-config.js"></script>
<script>
const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/"/g,'&quot;');
const CHART_TEMPLATE = ["SIZE","LENGTH","SHOULDER","BODY WIDTH","SLEEVE"];
const CATEGORIES = ["Tops","Pants","Jacket","Accessory","Other","Object","1OF1 + SAMPLE"];

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showPanel(); } else { $('loginView').style.display='block'; }
}
$('loginBtn').onclick = async ()=>{
  $('loginErr').textContent='';
  const { error } = await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});
  if(error){ $('loginErr').textContent=error.message; return; }
  showPanel();
};
$('logout').onclick = async ()=>{ await sb.auth.signOut(); location.reload(); };

function showPanel(){
  $('loginView').style.display='none';
  $('panel').style.display='block';
  $('logout').style.display='inline-block';
  load();
}

let PRODUCTS=[];
async function load(){
  const { data, error } = await sb.from('products').select('*').order('sort',{ascending:true});
  if(error){ alert('読込エラー: '+error.message); return; }
  PRODUCTS=data||[];
  render();
}

function normChart(c){
  // DB は {head,rows} 形式。編集中は内部的に cols で扱う。
  const head = c && (Array.isArray(c.head) ? c.head : (Array.isArray(c.cols) ? c.cols : null));
  if(head) return {cols:head.slice(), rows:(c.rows||[]).map(r=>r.slice())};
  return {cols:[], rows:[]};
}

function card(p){
  const imgs=(p.imgs||[]);
  const thumbs=imgs.map((u,i)=>'<div class="th"><img src="'+u+'"><button data-rm="'+i+'">×</button></div>').join('');
  return `<div class="card" data-id="${p.id??''}">
    <div class="row2">
      <div><label>商品名</label><input class="f-name" value="${esc(p.name)}"></div>
      <div><label>価格 (円)</label><input class="f-price" type="number" value="${p.price||0}"></div>
    </div>
    <div class="row2" style="margin-top:10px">
      <div><label>カテゴリ</label><select class="f-cat">${CATEGORIES.map(c=>'<option '+((p.cat||'').toLowerCase()===c.toLowerCase()?'selected':'')+'>'+c+'</option>').join('')}</select></div>
      <div><label>セール割引 (%) ※0でなし</label><input class="f-sale" type="number" min="0" max="100" value="${p.sale||0}"><div class="sale-hint"></div></div>
    </div>
    <div class="row2" style="margin-top:10px">
      <div><label>シーズン（自由入力 例: SS26）</label><input class="f-season" list="seasonlist" value="${esc(p.season)}" placeholder="例: SS26"></div>
      <div><label>表示順</label><input class="f-sort" type="number" value="${p.sort||0}"></div>
    </div>
    <label>説明</label><textarea class="f-descr">${esc(p.descr)}</textarea>
    <label>購入サイズ（カンマ区切り 例: 1,2 / 一点ものは OS）空欄なら OS</label><input class="f-sizes" value="${(p.sizes||[]).join(',')}">
    <label>サイズ別在庫</label>
    <div class="stockbox"></div>
    <button type="button" class="btn alt stockrefresh" style="margin-top:8px">サイズに合わせて在庫欄を更新</button>
    <label style="margin-top:14px">サイズチャート（採寸表）</label>
    <div class="chartbox"></div>
    <div class="chartbtns">
      <button type="button" class="btn alt caddc">＋ 列</button>
      <button type="button" class="btn alt caddr">＋ 行</button>
      <button type="button" class="btn alt ctmpl">標準テンプレを挿入</button>
      <button type="button" class="btn alt cclear">表を空にする</button>
    </div>
    <label style="margin-top:14px">画像</label>
    <div class="imgs">${thumbs}</div>
    <input type="file" class="f-file" accept="image/*" multiple style="margin-top:8px">
    <div class="cardfoot">
      <label class="chk"><input type="checkbox" class="f-sold" ${p.sold?'checked':''}> SOLD OUT</label>
      <button class="btn save">保存</button>
      <button class="btn del">削除</button>
      <span class="msg" style="display:none">保存しました</span>
    </div>
  </div>`;
}

function render(){
  const cats=[...new Set(PRODUCTS.map(p=>p.cat).filter(Boolean))];
  $('catlist').innerHTML = cats.map(c=>'<option value="'+esc(c)+'">').join('');
  const seasons=[...new Set(PRODUCTS.map(p=>p.season).filter(Boolean))];
  $('seasonlist').innerHTML = seasons.map(c=>'<option value="'+esc(c)+'">').join('');
  $('list').innerHTML = PRODUCTS.map(card).join('');
  $('list').querySelectorAll('.card').forEach(bindCard);
}

function bindCard(el){
  const id = el.dataset.id || null;
  const prod = id ? (PRODUCTS.find(x=>String(x.id)===String(id))||{}) : {};
  let imgs = (prod.imgs||[]).slice();
  let chart = normChart(prod.chart);

  // ---- images ----
  const drawImgs=()=>{ el.querySelector('.imgs').innerHTML = imgs.map((u,i)=>'<div class="th"><img src="'+u+'"><button data-rm="'+i+'">×</button></div>').join(''); bindRm(); };
  function bindRm(){ el.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ imgs.splice(+b.dataset.rm,1); drawImgs(); }); }
  bindRm();
  el.querySelector('.f-file').onchange = async (e)=>{
    const files=[...e.target.files]; if(!files.length) return;
    for(const f of files){
      const path = Date.now()+'-'+Math.random().toString(36).slice(2)+'-'+f.name.replace(/[^a-zA-Z0-9.]/g,'_');
      const { error } = await sb.storage.from('products').upload(path,f,{upsert:true});
      if(error){ alert('画像アップロード失敗: '+error.message); continue; }
      const { data } = sb.storage.from('products').getPublicUrl(path);
      imgs.push(data.publicUrl);
    }
    drawImgs();
  };

  // ---- size chart editor ----
  const box = el.querySelector('.chartbox');
  function drawChart(){
    if(!chart.cols.length){ box.innerHTML='<p class="muted">サイズ表なし。「標準テンプレを挿入」か「＋列」で作成できます。</p>'; return; }
    let h='<table class="ctbl"><thead><tr>';
    chart.cols.forEach((c,ci)=>{ h+='<th><input class="cc" data-c="'+ci+'" value="'+esc(c)+'"><button type="button" class="cdc" data-c="'+ci+'" title="この列を削除">×</button></th>'; });
    h+='<th></th></tr></thead><tbody>';
    chart.rows.forEach((r,ri)=>{
      h+='<tr>';
      chart.cols.forEach((c,ci)=>{ h+='<td><input class="cv" data-r="'+ri+'" data-c="'+ci+'" value="'+esc(r[ci])+'"></td>'; });
      h+='<td><button type="button" class="cdr" data-r="'+ri+'" title="この行を削除">×</button></td></tr>';
    });
    h+='</tbody></table>';
    box.innerHTML=h;
    box.querySelectorAll('.cc').forEach(i=>i.oninput=()=>{ chart.cols[+i.dataset.c]=i.value; });
    box.querySelectorAll('.cv').forEach(i=>i.oninput=()=>{ chart.rows[+i.dataset.r][+i.dataset.c]=i.value; });
    box.querySelectorAll('.cdc').forEach(b=>b.onclick=()=>{ const c=+b.dataset.c; chart.cols.splice(c,1); chart.rows.forEach(r=>r.splice(c,1)); drawChart(); });
    box.querySelectorAll('.cdr').forEach(b=>b.onclick=()=>{ chart.rows.splice(+b.dataset.r,1); drawChart(); });
  }
  drawChart();
  el.querySelector('.caddc').onclick=()=>{ chart.cols.push(''); chart.rows.forEach(r=>r.push('')); drawChart(); };
  el.querySelector('.caddr').onclick=()=>{ if(!chart.cols.length) chart.cols=CHART_TEMPLATE.slice(); chart.rows.push(chart.cols.map(()=>'')); drawChart(); };
  el.querySelector('.ctmpl').onclick=()=>{ chart.cols=CHART_TEMPLATE.slice(); chart.rows=[chart.cols.map(()=>''), chart.cols.map(()=>'')]; drawChart(); };
  el.querySelector('.cclear').onclick=()=>{ chart.cols=[]; chart.rows=[]; drawChart(); };

  // ---- size stock editor ----
  const stockBox = el.querySelector('.stockbox');
  const sizesEl = el.querySelector('.f-sizes');
  const hadStock = (prod.size_stock && typeof prod.size_stock==='object' && !Array.isArray(prod.size_stock));
  let stockState = hadStock ? Object.assign({}, prod.size_stock) : {};
  function sizesForStock(){
    const raw = sizesEl.value.trim();
    let list = raw ? raw.split(',').map(s=>s.trim()).filter(Boolean) : [];
    if(!list.length) list = ['OS'];
    return list;
  }
  function drawStock(){
    const sizes = sizesForStock();
    // サイズ別在庫が未設定の商品は、既存の総在庫を各サイズの初期値にする（保存で勝手に0にしない）
    sizes.forEach(s=>{ if(!(s in stockState)) stockState[s] = hadStock ? 0 : (parseInt(prod.stock,10)||0); });
    stockBox.innerHTML = sizes.map(s=>{
      const v = parseInt(stockState[s],10)||0;
      return '<div class="si"><label>'+esc(s)+(v<=0?' <span class="z">(0=売切)</span>':'')+'</label><input type="number" min="0" data-s="'+esc(s)+'" value="'+v+'"></div>';
    }).join('');
    stockBox.querySelectorAll('input').forEach(i=>i.oninput=()=>{ stockState[i.dataset.s]=parseInt(i.value,10)||0; });
  }
  drawStock();
  el.querySelector('.stockrefresh').onclick=drawStock;
  sizesEl.addEventListener('change', drawStock);

  // ---- sale hint ----
  const priceI=el.querySelector('.f-price'), saleI=el.querySelector('.f-sale'), hint=el.querySelector('.sale-hint');
  function updHint(){
    const pr=parseInt(priceI.value,10)||0, sl=parseInt(saleI.value,10)||0;
    hint.textContent = (sl>0&&pr>0) ? ('→ '+sl+'%OFF  ¥'+Math.round(pr*(100-sl)/100).toLocaleString()) : '';
  }
  priceI.oninput=updHint; saleI.oninput=updHint; updHint();

  // ---- save ----
  el.querySelector('.save').onclick = async ()=>{
    const sizesRaw = el.querySelector('.f-sizes').value.trim();
    const sizesArr = sizesRaw ? sizesRaw.split(',').map(s=>s.trim()).filter(Boolean) : null;
    const cleanCols = chart.cols.map(c=>String(c).trim());
    const hasChart = cleanCols.some(c=>c!=='') && chart.rows.length;
    // サイズ別在庫を確定（現在表示中のサイズのみ）。総在庫=合計。
    const curSizes = sizesForStock();
    const size_stock = {}; let total = 0;
    curSizes.forEach(s=>{ const q = parseInt(stockState[s],10)||0; size_stock[s]=q; total+=q; });
    const rec = {
      name: el.querySelector('.f-name').value.trim(),
      price: parseInt(el.querySelector('.f-price').value,10)||0,
      cat: el.querySelector('.f-cat').value.trim(),
      season: el.querySelector('.f-season').value.trim(),
      sale: Math.max(0, Math.min(100, parseInt(el.querySelector('.f-sale').value,10)||0)),
      stock: total,
      size_stock: size_stock,
      sort: parseInt(el.querySelector('.f-sort').value,10)||0,
      descr: el.querySelector('.f-descr').value,
      sizes: sizesArr,
      chart: hasChart ? {head:cleanCols, rows:chart.rows.map(r=>r.map(v=>String(v).trim()))} : null,
      imgs: imgs,
      sold: el.querySelector('.f-sold').checked
    };
    let res;
    if(id){ res = await sb.from('products').update(rec).eq('id',id); }
    else { res = await sb.from('products').insert(rec); }
    if(res.error){ alert('保存エラー: '+res.error.message); return; }
    const m=el.querySelector('.msg'); m.style.display='inline'; setTimeout(()=>m.style.display='none',1500);
    load();
  };

  // ---- delete ----
  el.querySelector('.del').onclick = async ()=>{
    if(!id){ el.remove(); return; }
    if(!confirm('この商品を削除しますか？')) return;
    const { error } = await sb.from('products').delete().eq('id',id);
    if(error){ alert('削除エラー: '+error.message); return; }
    load();
  };
}

$('addBtn').onclick = ()=>{
  const el=document.createElement('div');
  el.innerHTML=card({cat:'',sale:0,stock:0,sort:(PRODUCTS.length+1),imgs:[]});
  const node=el.firstElementChild; $('list').prepend(node); bindCard(node);
  node.scrollIntoView({behavior:'smooth'});
};

init();
</script>
</body>
</html>
