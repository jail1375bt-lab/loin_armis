<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT — LOIN ARMIS</title>
<style>
  @font-face{font-family:'Octin';src:url('OctinCollege.otf') format('opentype');font-display:swap}
  @font-face{font-family:'Magazine';src:url('Magazine.ttf') format('truetype');font-display:swap}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#fff;color:#0a0a0a;line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}svg{display:block}
  header{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1.5px solid #0a0a0a}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 18px;max-width:1400px;margin:0 auto}
  .back{display:flex;align-items:center;gap:8px;font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em}
  .brand{justify-self:center}.brand img{height:18px;width:auto}
  .right{font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em;justify-self:end;color:#7a7a7a}
  main{flex:1;max-width:540px;margin:0 auto;width:100%;padding:40px 22px 80px}
  h1{font-family:"Magazine",sans-serif;font-size:clamp(24px,6vw,34px);letter-spacing:.05em;margin-bottom:8px}
  .sub{font-family:"Octin",monospace;font-size:12.5px;letter-spacing:.06em;color:#7a7a7a;margin-bottom:26px}
  label{display:block;font-family:"Octin",monospace;font-size:11px;letter-spacing:.14em;color:#7a7a7a;margin:16px 0 6px}
  input,textarea{width:100%;font-family:"Octin",monospace;font-size:14px;padding:13px 14px;border:1px solid #0a0a0a;background:#fff;color:#0a0a0a}
  textarea{min-height:140px;resize:vertical}
  .send{font-family:"Octin",monospace;letter-spacing:.22em;font-size:13px;border:1px solid #0a0a0a;padding:15px 0;background:#0a0a0a;color:#fff;width:100%;margin-top:22px}
  .send:hover{background:#fff;color:#0a0a0a}.send:disabled{opacity:.4}
  .note{font-family:"Octin",monospace;font-size:12px;letter-spacing:.06em;color:#7a7a7a;margin-top:18px;line-height:1.8;text-align:center}
  .note a{color:#0a0a0a;text-decoration:underline}
  .ok{font-family:"Magazine",sans-serif;font-size:24px;text-align:center;padding:40px 0}
  .err{color:#e2231a;font-family:"Octin",monospace;font-size:12px;text-align:center;margin-top:10px}
  footer{border-top:1px solid #e6e6e6;font-family:monospace;font-size:11px;color:#7a7a7a;letter-spacing:.1em;padding:28px 18px;text-align:center}
</style>
</head>
<body>
<header><div class="bar">
  <a class="back" href="index.html"><svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>HOME</a>
  <a class="brand" href="index.html"><img src="LOIN_ARMIS_LOGO.svg" alt="LOIN ARMIS"></a>
  <span class="right">CONTACT</span>
</div></header>
<main id="main">
  <h1>CONTACT</h1>
  <div class="sub">お問い合わせはこちらから。通常2〜3営業日以内に返信します。</div>
  <form id="cf">
    <label>NAME</label><input type="text" id="cname" required>
    <label>EMAIL</label><input type="email" id="cemail" required>
    <label>MESSAGE</label><textarea id="cmsg" required></textarea>
    <button class="send" id="sendBtn" type="submit">SEND</button>
    <div class="err" id="cerr"></div>
  </form>
  <div class="note">または Instagram の DM でも受け付けています →
    <a href="https://www.instagram.com/loin_armis/" target="_blank" rel="noopener">@loin_armis</a></div>
</main>
<footer>LOIN ARMIS © 2026 — ALL RIGHTS RESERVED.</footer>
<script src="contact-config.js"></script>
<script>
var main=document.getElementById('main');
var form=document.getElementById('cf');
function done(){ main.innerHTML='<div class="ok">THANK YOU</div><div class="note">お問い合わせを受け付けました。返信をお待ちください。<br><a href="index.html">CONTINUE</a></div>'; }
if(!window.W3F_KEY){
  // キー未設定：DM案内に切替
  form.style.display='none';
  document.querySelector('.sub').textContent='現在フォーム準備中です。Instagram の DM からご連絡ください。';
}
form.addEventListener('submit',function(e){
  e.preventDefault();
  var btn=document.getElementById('sendBtn');btn.disabled=true;
  fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},
    body:JSON.stringify({access_key:window.W3F_KEY,subject:'LOIN ARMIS Contact',name:document.getElementById('cname').value,email:document.getElementById('cemail').value,message:document.getElementById('cmsg').value})})
   .then(function(r){return r.json();})
   .then(function(d){ if(d.success){done();} else {document.getElementById('cerr').textContent=(d.message||'送信に失敗しました');btn.disabled=false;} })
   .catch(function(){document.getElementById('cerr').textContent='通信エラー。時間をおいて再度お試しください。';btn.disabled=false;});
});
</script>
</body>
</html>
