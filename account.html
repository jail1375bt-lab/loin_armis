<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOIN ARMIS — ACCOUNT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @font-face{font-family:'Octin';src:url('OctinCollege.otf') format('opentype');font-display:swap}
  @font-face{font-family:'OPTITimes';src:url('OPTITimes-Roman.otf') format('opentype');font-display:swap}
  :root{--ink:#0a0a0a;--line:#e6e6e6;--hard:#0a0a0a;--muted:#7a7a7a;--accent:#e2231a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#fff;color:var(--ink);line-height:1.5;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
  a{color:inherit;text-decoration:none}svg{display:block}
  #sight{position:fixed;top:0;left:0;width:46px;height:46px;margin:-23px 0 0 -23px;pointer-events:none;z-index:9999;mix-blend-mode:multiply;transition:width .12s,height .12s,margin .12s}
  #sight .ring{position:absolute;inset:13px;border:1px solid var(--ink);border-radius:50%}
  #sight .h,#sight .v{position:absolute;background:var(--ink)}
  #sight .h{left:3px;right:3px;top:50%;height:1px;margin-top:-.5px}
  #sight .v{top:3px;bottom:3px;left:50%;width:1px;margin-left:-.5px}
  #sight .dot{position:absolute;top:50%;left:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;background:var(--accent);border-radius:50%;box-shadow:0 0 4px 1px rgba(226,35,26,.95),0 0 9px 3px rgba(226,35,26,.7)}
  @media (hover:hover) and (pointer:fine){ *{cursor:none !important} }
  header{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1.5px solid var(--hard)}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 18px;max-width:1400px;margin:0 auto}
  .back{display:flex;align-items:center;gap:8px;font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em}
  .back:hover{color:var(--accent)}
  .brand{justify-self:center}.brand img{height:18px;width:auto}
  .right{font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em;justify-self:end;color:var(--muted)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px 90px}
  .auth{width:100%;max-width:380px}
  .tabs{display:flex;border:1.5px solid var(--hard);margin-bottom:26px}
  .tabs button{flex:1;font-family:"Octin",monospace;font-size:12px;letter-spacing:.16em;padding:14px 0;background:#fff;border:none;color:var(--muted);cursor:pointer}
  .tabs button.on{background:var(--ink);color:#fff}
  h1{font-family:"OPTITimes",serif;font-size:28px;letter-spacing:.03em;margin-bottom:6px;text-align:center}
  .sub{font-family:"Octin",monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-align:center;margin-bottom:26px}
  label{display:block;font-family:"Octin",monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);margin:14px 0 5px}
  input{width:100%;font-family:"Octin",monospace;font-size:14px;letter-spacing:.04em;padding:14px 14px;border:1px solid var(--hard);background:#fff;color:var(--ink)}
  input::placeholder{color:#9a9a9a}
  .btn{width:100%;font-family:"Octin",monospace;letter-spacing:.2em;font-size:13px;padding:16px 0;background:var(--ink);color:#fff;border:1px solid var(--hard);margin-top:22px;cursor:pointer}
  .btn:hover{background:#fff;color:var(--ink)}
  .msg{font-family:"Octin",monospace;font-size:12px;letter-spacing:.04em;line-height:1.7;text-align:center;margin-top:16px;min-height:18px}
  .msg.err{color:var(--accent)}
  .msg.ok{color:#0a6b2f}
  .acct{text-align:center}
  .acct .em{font-family:"Octin",monospace;font-size:13px;letter-spacing:.08em;color:var(--muted);margin-bottom:24px}
  .orders{text-align:left;margin:6px 0 8px;border-top:1px solid var(--line);padding-top:18px}
  .ohead{font-family:"Octin",monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);margin-bottom:14px;text-align:center}
  .omsg{font-family:"Octin",monospace;font-size:12px;color:var(--muted);text-align:center;padding:10px 0}
  .orow{border:1px solid var(--line);padding:12px 14px;margin-bottom:10px}
  .otop{display:flex;justify-content:space-between;font-family:"Octin",monospace;font-size:12px;letter-spacing:.06em}
  .oitems{font-family:"OPTITimes",serif;font-size:14px;margin-top:6px;line-height:1.3}
  .ostatus{font-family:"Octin",monospace;font-size:10px;letter-spacing:.1em;color:#0a6b2f;margin-top:6px;text-transform:uppercase}
  .link{font-family:"Octin",monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-align:center;margin-top:20px}
  .link a{color:var(--ink);border-bottom:1px solid var(--ink)}
  footer{border-top:1px solid var(--line);font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;padding:26px 18px;text-align:center}
</style>
</head>
<body>
<div id="sight" aria-hidden="true"><div class="ring"></div><div class="h"></div><div class="v"></div><div class="dot"></div></div>
<header><div class="bar">
  <a class="back" href="index.html"><svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>BACK</a>
  <a class="brand" href="index.html"><img src="LOIN_ARMIS_LOGO.svg" alt="LOIN ARMIS"></a>
  <span class="right">ACCOUNT</span>
</div></header>
<main id="main"></main>
<footer>LOIN ARMIS © 2026 — ALL RIGHTS RESERVED.</footer>

<script src="supabase-config.js"></script>
<script>
const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
const m = document.getElementById('main');

async function render(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session && session.user){ accountView(session.user); } else { authView('signup'); }
}

function authView(mode){
  m.innerHTML =
   '<div class="auth">'
   + '<div class="tabs"><button data-t="signup">新規登録</button><button data-t="login">ログイン</button></div>'
   + '<h1 id="ttl"></h1><div class="sub" id="sub"></div>'
   + '<form id="f">'
   + '<label>メールアドレス</label><input id="email" type="email" placeholder="you@example.com" required autocomplete="email">'
   + '<label>パスワード</label><input id="pw" type="password" placeholder="6文字以上" required minlength="6" autocomplete="current-password">'
   + '<button class="btn" id="submit" type="submit"></button>'
   + '<div class="msg" id="msg"></div>'
   + '</form></div>';
  const tabs = m.querySelectorAll('.tabs button');
  function setMode(md){
    tabs.forEach(b=>b.classList.toggle('on', b.dataset.t===md));
    document.getElementById('ttl').textContent = md==='signup' ? 'CREATE ACCOUNT' : 'LOG IN';
    document.getElementById('sub').textContent = md==='signup' ? 'LOIN ARMIS のアカウントを作成' : 'おかえりなさい';
    document.getElementById('submit').textContent = md==='signup' ? 'アカウントを作成' : 'ログイン';
    document.getElementById('msg').textContent='';
    m.dataset.mode = md;
  }
  tabs.forEach(b=>b.onclick=()=>setMode(b.dataset.t));
  setMode(mode);
  document.getElementById('f').addEventListener('submit', onSubmit);
}

async function onSubmit(e){
  e.preventDefault();
  const md = m.dataset.mode;
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit');
  msg.className='msg'; msg.textContent='処理中…'; btn.disabled=true;
  try{
    if(md==='signup'){
      const { data, error } = await sb.auth.signUp({ email, password: pw });
      if(error){ msg.className='msg err'; msg.textContent=error.message; }
      else if(data.session){ accountView(data.session.user); }
      else { msg.className='msg ok'; msg.textContent='確認メールを送信しました。メール内のリンクをクリックして登録を完了してください。'; }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password: pw });
      if(error){ msg.className='msg err'; msg.textContent = error.message==='Email not confirmed' ? 'メールアドレスの確認が完了していません。確認メールのリンクをクリックしてください。' : error.message; }
      else { render(); }
    }
  }catch(err){ msg.className='msg err'; msg.textContent='通信エラーが発生しました。'; }
  btn.disabled=false;
}

function accountView(user){
  m.innerHTML =
   '<div class="auth acct">'
   + '<h1>MY ACCOUNT</h1>'
   + '<div class="em">'+ (user.email||'') +'</div>'
   + '<div class="orders" id="orders"><div class="ohead">注文履歴 / ORDER HISTORY</div><div class="omsg">読み込み中…</div></div>'
   + '<a class="btn" href="index.html" style="display:block;background:#fff;color:var(--ink)">ショッピングを続ける</a>'
   + '<button class="btn" id="logout">ログアウト</button>'
   + '</div>';
  document.getElementById('logout').onclick = async ()=>{ await sb.auth.signOut(); render(); };
  loadOrders();
}

function fmt(n){ return '¥' + (Number(n)||0).toLocaleString(); }
async function loadOrders(){
  const box = document.getElementById('orders'); if(!box) return;
  const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending:false });
  let html = '<div class="ohead">注文履歴 / ORDER HISTORY</div>';
  if(error){ box.innerHTML = html + '<div class="omsg">読み込みエラー: '+error.message+'</div>'; return; }
  if(!data || !data.length){ box.innerHTML = html + '<div class="omsg">まだ注文はありません。</div>'; return; }
  html += data.map(function(o){
    const d = new Date(o.created_at);
    const ds = d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);
    const items = (o.items||[]).map(function(it){ return (it.name||'ITEM') + (it.size?(' ('+it.size+')'):''); }).join(', ');
    return '<div class="orow"><div class="otop"><span>'+ds+'</span><span>'+fmt(o.total)+'</span></div>'
         + '<div class="oitems">'+items+'</div>'
         + '<div class="ostatus">'+(o.status||'paid')+'</div></div>';
  }).join('');
  box.innerHTML = html;
}

render();

/* カーソル */
const sight=document.getElementById('sight');
let tx=innerWidth/2,ty=innerHeight/2,cx=tx,cy=ty;
addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
addEventListener('touchstart',e=>{const t=e.touches[0];if(t){tx=cx=t.clientX;ty=cy=t.clientY}},{passive:true});
addEventListener('touchmove',e=>{const t=e.touches[0];if(t){tx=t.clientX;ty=t.clientY}},{passive:true});
(function loop(){cx+=(tx-cx)*0.35;cy+=(ty-cy)*0.35;sight.style.transform='translate('+cx+'px,'+cy+'px)';requestAnimationFrame(loop);})();
const armSel='a,button,input';
document.addEventListener('mouseover',e=>{if(e.target.closest(armSel))document.body.classList.add('armed')});
document.addEventListener('mouseout',e=>{if(e.target.closest(armSel))document.body.classList.remove('armed')});
</script>
<script src="countdown.js"></script>
</body>
</html>
